/* ---------- Marca "M · A" (assinatura visual) ---------- */
function Connector({ height = 88, color = "#fff" }) {
  const w = height * 0.34;
  const scale = height / 110; // px reais por unidade do viewBox
  const sw = Math.max(1, 1 / scale); // nunca menos que ~1px real, senão vira cinza
  const topR = Math.max(3.4, 1.6 / scale);
  const botR = Math.max(3.2, 1.5 / scale);
  return (
    <svg width={w} height={height} viewBox="0 0 40 110" fill="none" style={{ display: "block", flexShrink: 0 }}>
      <circle cx="20" cy="7" r={topR} fill={color} />
      <line x1="20" y1="11" x2="20" y2="79" stroke={color} strokeWidth={sw} />
      <rect x="6" y="79" width="28" height="28" rx="7" stroke={color} strokeWidth={sw} />
      <circle cx="20" cy="93" r={botR} fill={color} />
    </svg>
  );
}

/* M com o vão central aberto — não toca a base, o negativo é o desenho */
function LetterM({ size = 54, color = "#fff" }) {
  const w = size * (100 / 110);
  const strokeW = Math.max(110 / size, size * 0.024); // espessura real mínima ~1px, nunca cinza
  return (
    <svg
      width={w}
      height={size}
      viewBox="0 0 100 110"
      fill="none"
      style={{ display: "block", flexShrink: 0 }}
    >
      <path
        d="M8,4 L8,100 M8,4 L47,62 M47,62 L86,4 M86,4 L86,100"
        stroke={color}
        strokeWidth={strokeW}
        strokeLinecap="round"
        strokeLinejoin="round"
      />
    </svg>
  );
}

/* A de ápice pontudo, travessa a meia altura */
function LetterA({ size = 54, color = "#fff" }) {
  const w = size * (90 / 110);
  const strokeW = Math.max(110 / size, size * 0.024); // espessura real mínima ~1px, nunca cinza
  return (
    <svg
      width={w}
      height={size}
      viewBox="0 0 90 110"
      fill="none"
      style={{ display: "block", flexShrink: 0 }}
    >
      <path
        d="M45,4 L6,100 M45,4 L84,100 M22,66 L68,66"
        stroke={color}
        strokeWidth={strokeW}
        strokeLinecap="round"
        strokeLinejoin="round"
      />
    </svg>
  );
}

function Wordmark({ size = 56, color = "#fff", opacity = 1, style = {} }) {
  return (
    <div
      style={{
        display: "flex",
        alignItems: "flex-start",
        gap: size * 0.22,
        opacity,
        ...style,
      }}
    >
      <LetterM size={size} color={color} />
      <div style={{ marginTop: size * 0.39 }}>
        <Connector height={size * 1.7} color={color} />
      </div>
      <LetterA size={size} color={color} />
    </div>
  );
}

/* ---------- Marcador de conclusão (dashboard) ---------- */
function TaskMarker({
  done,
  onToggle,
  scale = 1,
  zen = false,
  doneLabel = "Done",
  todoLabel = "Mark as done",
  fg = "#ffffff",
  bg = "#000000",
}) {
  const size = 64 * scale;
  const c = size / 2;
  const r = 26 * scale;
  const k = size / 64;
  return (
    <button
      onClick={onToggle}
      aria-pressed={done}
      aria-label={done ? doneLabel : todoLabel}
      className="ma-marker ma-fade-focus"
      style={{
        position: "relative",
        width: size,
        height: size,
        background: "transparent",
        border: "none",
        cursor: done ? "default" : "pointer",
        padding: 0,
      }}
    >
      {done && !zen && (
        <span
          style={{
            position: "absolute",
            inset: 0,
            borderRadius: "9999px",
            border: `1px solid ${fg}`,
            animation: "ma-pulse-ring 700ms ease-out",
          }}
        />
      )}
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={c} cy={c} r={r} fill="none" stroke={fg} strokeOpacity="0.28" strokeWidth="1" />
        <circle
          className="ma-check-fill"
          cx={c}
          cy={c}
          r={r - 4 * k}
          fill={fg}
          style={{
            transformOrigin: `${c}px ${c}px`,
            transform: done ? "scale(1)" : "scale(0)",
            opacity: done ? 1 : 0,
          }}
        />
        <path
          className="ma-check-mark"
          d={`M${21 * k} ${32.5 * k} L${28.5 * k} ${40 * k} L${43 * k} ${24 * k}`}
          fill="none"
          stroke={bg}
          strokeWidth={2.4 * k}
          strokeLinecap="round"
          strokeLinejoin="round"
          strokeDasharray={34 * k}
          strokeDashoffset={done ? 0 : 34 * k}
        />
        {!done && (
          <circle
            className={zen ? "" : "ma-idle-dot"}
            cx={c}
            cy={c}
            r={2.4 * k}
            fill={fg}
            style={{ opacity: zen ? 0.55 : undefined }}
          />
        )}
      </svg>
    </button>
  );
}

      <label
        htmlFor={id}

          display: "block",
          fontSize: 11,
          letterSpacing: "0.18em",
          textTransform: "uppercase",
          color: "rgba(0,0,0,0.4)",
          marginBottom: 10,
        }}
      >
        {label}
      </label>
      <input
        id={id}
        type={type}
        inputMode={inputMode}
        maxLength={maxLength}
        value={value}
        placeholder={placeholder}
        onChange={onChange}
        className={`ma-input ma-fade-focus${value ? " ma-filled" : ""}`}
        style={{
          width: "100%",
          fontFamily: "Inter, sans-serif",
          fontSize: 16,
          fontWeight: 400,
          color: "#000000",

/* ---------- Switch premium (trilho + esfera, monocromático) ---------- */
function Switch({ checked, onChange, scale = 1, label, fg = "#ffffff", bg = "#000000" }) {
  const w = 44 * scale;
  const h = 26 * scale;
  const knob = h - 8;
  const travel = w - h + 2;
  return (
    <button
      role="switch"
      aria-checked={checked}
      aria-label={label}
      onClick={() => onChange(!checked)}
      className="ma-fade-focus"
      style={{
        width: w,
        height: h,
        borderRadius: h / 2,
        border: `1px solid ${checked ? fg : withAlpha(fg, 0.35)}`,
        background: checked ? fg : "transparent",
        position: "relative",
        padding: 0,
        cursor: "pointer",
        flexShrink: 0,
        transition: "background 260ms ease, border-color 260ms ease",
      }}
    >
      <span
        style={{
          position: "absolute",
          top: 3,
          left: 3,
          width: knob,
          height: knob,
          borderRadius: "50%",
          background: checked ? bg : fg,
          transform: `translateX(${checked ? travel : 0}px)`,
          transition: "transform 260ms cubic-bezier(0.4,0,0.2,1), background 260ms ease",
        }}
      />
    </button>
  );
}

/* ---------- Seletor segmentado (texto + hairlines, sem botões pesados) ---------- */
function Segmented({ options, value, onChange, scale = 1, fg = "#ffffff" }) {
  return (
    <div
      style={{
        display: "flex",
        border: `1px solid ${withAlpha(fg, 0.16)}`,
      }}
    >
      {options.map((opt, i) => (
        <button
          key={opt.value}

            padding: `${13 * scale}px 4px`,
            background: "transparent",
            border: "none",
            borderLeft: i > 0 ? `1px solid ${withAlpha(fg, 0.16)}` : "none",
            color: value === opt.value ? fg : withAlpha(fg, 0.4),

            letterSpacing: "0.12em",

}

/* ---------- Gráfico de pizza (donut, monocromático) ---------- */
function Donut({ percent, count, of, label, fg, bg, scale = 1 }) {
  const size = 148 * scale;
  const r = 58;
  const c = 2 * Math.PI * r;
  const filled = (Math.max(0, Math.min(100, percent)) / 100) * c;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 * scale }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} viewBox="0 0 140 140">
          <circle cx="70" cy="70" r={r} fill="none" stroke={withAlpha(fg, 0.14)} strokeWidth="10" />
          <circle
            cx="70"
            cy="70"
            r={r}
            fill="none"
            stroke={fg}
            strokeWidth="10"
            strokeLinecap="round"
            strokeDasharray={`${filled} ${c}`}
            transform="rotate(-90 70 70)"
            style={{ transition: "stroke-dasharray 600ms cubic-bezier(0.4,0,0.2,1)" }}
          />
        </svg>
        <div
          style={{
            position: "absolute",
            inset: 0,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            fontFamily: "Inter, sans-serif",
            fontSize: 22 * scale,
            fontWeight: 500,
            color: fg,
          }}
        >
          {percent}%
        </div>
      </div>
      <div style={{ textAlign: "center" }}>
        <div
          style={{
            fontSize: 12 * scale,
            letterSpacing: "0.14em",
            textTransform: "uppercase",
            color: fg,
            marginBottom: 4,
          }}
        >
          {label}
        </div>
        <div style={{ fontSize: 11 * scale, color: withAlpha(fg, 0.45) }}>{count}</div>
      </div>
    </div>
  );
}

  const [escalationVisible, setEscalationVisible] = useState(false);
  const [escalationSeen, setEscalationSeen] = useState(false);
  const [physicalChoice, setPhysicalChoice] = useState(null); // null | true | false
  const [mentalChoice, setMentalChoice] = useState(null);

  // Gráficos — sem servidor, então simulamos os 29 dias anteriores 1x por sessão;
  // hoje entra ao vivo, de acordo com o que a pessoa está marcando agora.
  const [monthlyBase] = useState(() => Array.from({ length: 29 }, dayCount));
  const [statsOpacity, setStatsOpacity] = useState(0);

  const passwordsMatch = confirmPassword.length === 6 && confirmPassword === password;

  const missingFields = [];
  if (!nameValid) missingFields.push(t.missingName);
  if (!emailValid) missingFields.push(t.missingEmail);
  if (!passwordValid) missingFields.push(t.missingPassword);
  if (passwordValid && !passwordsMatch) missingFields.push(t.missingConfirm);

  const after = (fn, ms) => {
    const t = setTimeout(fn, ms);
    timers.current.push(t);
    return t;
  };

  // Splash sequence — o conector nasce no pé da tela e sobe até seu lugar
  useEffect(() => {
    if (screen !== "splash") return;
    after(() => setLettersOpacity(1), 60);
    after(() => setConnectorRisen(true), 250);
    after(() => {
      setOverlayMs(900);
      setOverlayOpacity(1);
      setScreen("signup");
    }, 4000);
    return () => timers.current.forEach(clearTimeout);
  }, [screen]);

  useEffect(() => {
    if (screen !== "signup") return;
    const t = setTimeout(() => setOverlayOpacity(0), 90);
    return () => clearTimeout(t);
  }, [screen]);

  // Dashboard entrance fade
  useEffect(() => {

    }

  }, [screen]);

  useEffect(() => {

  const dayNumber = monthlyBase.length + 1; // "hoje" é o dia seguinte ao histórico simulado

  const progressPercent = Math.round((doneCount / 4) * 100);

  const monthTotal = monthlySeries.reduce((a, b) => a + b, 0);

  useEffect(() => {

                    { value: "matutino", label: t.morning },
                    { value: "vespertino", label: t.afternoon },
                    { value: "noturno", label: t.night },
                  ]}
                />
              </div>

              <div style={{ height: 1, background: withAlpha(theme.fg, 0.12) }} />

              {/* 3. Pilar 2 — fácil de usar (letras grandes) */}
              <div style={{ padding: `${26 * uiScale}px 0` }}>
                <div
                  style={{
                    fontSize: 11 * uiScale,
                    letterSpacing: "0.18em",
                    textTransform: "uppercase",
                    color: withAlpha(theme.fg, 0.4),
                    marginBottom: 6,
                  }}
                >
                  {t.pillar2Eyebrow}
                </div>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    marginTop: 14,
                  }}
                >
                  <p className="ma-serif" style={{ fontSize: 19 * uiScale, color: theme.fg, margin: 0 }}>
                    {t.seniorTitle}
                  </p>
                  <Switch
                    checked={seniorMode}
                    onChange={setSeniorMode}
                    scale={uiScale}
                    label={t.seniorTitle}
                    fg={theme.fg}
                    bg={theme.bg}
                  />
                </div>
                <p
                  style={{
                    fontSize: 12 * uiScale,
                    color: withAlpha(theme.fg, 0.42),
                    lineHeight: 1.5,
                    margin: "10px 0 0",
                    maxWidth: 280,
                  }}
                >
                  {t.seniorDesc}
                </p>
              </div>

              <div style={{ height: 1, background: withAlpha(theme.fg, 0.12) }} />

              {/* 4. Pilar 3 — sem culpa nos dias corridos (dias de folga) */}
              <div style={{ padding: `${26 * uiScale}px 0` }}>
                <div
                  style={{
                    fontSize: 11 * uiScale,
                    letterSpacing: "0.18em",
                    textTransform: "uppercase",
                    color: withAlpha(theme.fg, 0.4),
                    marginBottom: 6,
                  }}
                >
                  {t.pillar3Eyebrow}
                </div>
                <p
                  className="ma-serif"
                  style={{
                    fontSize: 19 * uiScale,
                    color: theme.fg,
                    margin: "0 0 16px",
                    fontWeight: 400,
                  }}
                >
                  {t.graceTitle}
                </p>
                <Segmented
                  scale={uiScale}
                  fg={theme.fg}
                  value={graceDays}
                  onChange={setGraceDays}
                  options={[
                    { value: 1, label: t.day1 },
                    { value: 2, label: t.day2 },
                    { value: 3, label: t.day3 },
                  ]}
                />
                <p
                  style={{
                    fontSize: 12 * uiScale,
                    color: withAlpha(theme.fg, 0.42),
                    lineHeight: 1.5,
                    margin: "12px 0 0",
                    maxWidth: 280,
                  }}
                >
                  {t.graceDesc}
                </p>
              </div>

              <div style={{ height: 1, background: withAlpha(theme.fg, 0.12) }} />

              {/* 5. Menos distração na tela (modo tranquilo) */}
              <div style={{ padding: `${26 * uiScale}px 0` }}>
                <div
                  style={{
                    fontSize: 11 * uiScale,
                    letterSpacing: "0.18em",
                    textTransform: "uppercase",
                    color: withAlpha(theme.fg, 0.4),
                    marginBottom: 6,
                  }}
                >
                  {t.pillar4Eyebrow}
                </div>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    marginTop: 14,
                  }}
                >
                  <p className="ma-serif" style={{ fontSize: 19 * uiScale, color: theme.fg, margin: 0 }}>
                    {t.zenTitle}
                  </p>
                  <Switch
                    checked={zenMode}
                    onChange={setZenMode}
                    scale={uiScale}
                    label={t.zenTitle}
                    fg={theme.fg}
                    bg={theme.bg}
                  />
                </div>
                <p
                  style={{
                    fontSize: 12 * uiScale,
                    color: withAlpha(theme.fg, 0.42),
                    lineHeight: 1.5,
                    margin: "10px 0 0",
                    maxWidth: 280,
                  }}
                >
                  {t.zenDesc}
                </p>
              </div>

              <div style={{ height: 1, background: withAlpha(theme.fg, 0.12) }} />

              {/* 6. Ligar com outros apps de saúde */}
              <div style={{ padding: `${26 * uiScale}px 0 4px` }}>
                <div
                  style={{
                    fontSize: 11 * uiScale,
                    letterSpacing: "0.18em",
                    textTransform: "uppercase",
                    color: withAlpha(theme.fg, 0.4),
                    marginBottom: 6,
                  }}
                >
                  {t.pillar5Eyebrow}
                </div>
                <button
                  onClick={connectHealth}
                  disabled={healthStatus === "connected"}
                  className="ma-fade-focus"
                  style={{
                    width: "100%",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    background: "transparent",
                    border: "none",
                    padding: `${14 * uiScale}px 0`,
                    cursor: healthStatus === "connected" ? "default" : "pointer",
                  }}
                >
                  <p className="ma-serif" style={{ fontSize: 19 * uiScale, color: theme.fg, margin: 0 }}>
                    {t.healthTitle}
                  </p>
                  <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span
                      style={{
                        width: 6,
                        height: 6,
                        borderRadius: "9999px",
                        background:
                          healthStatus === "connected"
                            ? theme.fg
                            : healthStatus === "syncing"
                            ? withAlpha(theme.fg, 0.85)
                            : withAlpha(theme.fg, 0.25),
                        animation:
                          healthStatus === "syncing" && !zenMode ? "ma-breathe 900ms ease-in-out infinite" : "none",
                      }}
                    />
                    <span
                      style={{
                        fontSize: 11 * uiScale,
                        letterSpacing: "0.12em",
                        textTransform: "uppercase",
                        color: withAlpha(theme.fg, 0.5),
                      }}
                    >
                      {healthStatus === "connected" ? t.connected : healthStatus === "syncing" ? t.syncing : t.connect}
                    </span>
                  </span>
                </button>
              </div>

              <div style={{ display: "flex", justifyContent: "center", paddingTop: 30 * uiScale }}>
                <Wordmark size={18} color={theme.fg} />
              </div>
            </div>
          </div>
        )}

        {/* Overlay de transição (acender / apagar as luzes) */}
        <div
          style={{
            position: "absolute",
            inset: 0,
            background: "#000000",
            opacity: overlayOpacity,
            transition: `opacity ${overlayMs}ms cubic-bezier(0.4,0,0.2,1)`,
            pointerEvents: overlayOpacity > 0.02 ? "auto" : "none",
            zIndex: 50,
          }}
        />
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MAApp />);
</script>
</body>
</html>
